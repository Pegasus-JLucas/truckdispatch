<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Excel Dashboard</title>
  <meta http-equiv="refresh" content="120">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    src="https://pegind.sharepoint.com/sites/truckdriverdispatch/_layouts/15/Doc.aspx?sourcedoc={e72b98c6-15aa-4a96-a3d2-801c0d8144ac}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&wdInConfigurator=True"
    allowfullscreen>
  </iframe>

  <script>
    async function keepAwake() {
      try {
        if ("wakeLock" in navigator) {
          const lock = await navigator.wakeLock.request("screen");
          lock.addEventListener("release", () => {
            keepAwake();
          });
        }
      } catch (err) {
        console.log("Wake Lock error:", err);
      }
    }

    setInterval(() => {
      document.dispatchEvent(new MouseEvent("mousemove"));
      document.dispatchEvent(new KeyboardEvent("keydown"));
    }, 60000);

    keepAwake();
  </script>
</body>
</html>
